<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Discord Player</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; display: flex; justify-content: center; align-items: center; }
        iframe { width: 100%; height: 100%; border: none; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #5865F2; color: white; border: none; border-radius: 5px; font-weight: bold; font-family: sans-serif; transition: 0.2s; }
        button:hover { background: #4752C4; }
    </style>
</head>
<body>
    <div id="player-block">
        <button onclick="startVideo()">Включить музыку</button>
    </div>

    <script>
        function startVideo() {
            const block = document.getElementById('player-block');
            block.innerHTML = '<iframe src="https://youtube.com" allow="autoplay; encrypted-media" allowfullscreen></iframe>';
        }
    </script>
</body>
</html>
